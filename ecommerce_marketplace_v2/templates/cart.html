{% extends 'base.html' %}{% block content %}
<h2>Shopping Cart</h2>
{% for p in products %}
<div class="card">{{p.name}} - ₹{{'%.2f'|format(p.price)}}</div>
{% else %}
<p>Your cart is empty.</p>
{% endfor %}
<h3>Total: ₹{{'%.2f'|format(total)}}</h3>
{% if products %}<a href="/checkout">Place Order</a>{% endif %}
{% endblock %}
