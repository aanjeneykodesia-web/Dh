<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Marketplace V2</title>
<style>
body{font-family:Arial;max-width:1100px;margin:auto;padding:20px}
nav a{margin-right:12px}
.card{border:1px solid #ddd;border-radius:8px;padding:15px;margin:10px 0}
input,textarea{width:100%;padding:8px;margin:5px 0}
button{padding:10px 15px}
.flash{background:#eef;padding:10px;border-radius:6px;margin:10px 0}
</style>
</head>
<body>
<h1>Marketplace V2</h1>
<nav>
<a href="/">Home</a>
<a href="/register/buyer">Buyer Register</a>
<a href="/register/seller">Seller Register</a>
<a href="/login">Login</a>
<a href="/cart">Cart</a>
<a href="/seller">Seller Dashboard</a>
<a href="/admin">Admin</a>
<a href="/logout">Logout</a>
</nav>
{% with messages = get_flashed_messages() %}
{% for m in messages %}<div class="flash">{{m}}</div>{% endfor %}
{% endwith %}
{% block content %}{% endblock %}
</body>
</html>
